<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1a1814"/>
  <!-- Grain/wheat stem -->
  <line x1="16" y1="28" x2="16" y2="10" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Grain seeds left -->
  <ellipse cx="12.5" cy="14" rx="3" ry="1.6" fill="#c9a96e" transform="rotate(-35 12.5 14)"/>
  <ellipse cx="11.5" cy="18" rx="3" ry="1.6" fill="#c9a96e" transform="rotate(-30 11.5 18)"/>
  <ellipse cx="12" cy="22" rx="3" ry="1.6" fill="#c9a96e" transform="rotate(-25 12 22)"/>
  <!-- Grain seeds right -->
  <ellipse cx="19.5" cy="14" rx="3" ry="1.6" fill="#c9a96e" transform="rotate(35 19.5 14)"/>
  <ellipse cx="20.5" cy="18" rx="3" ry="1.6" fill="#c9a96e" transform="rotate(30 20.5 18)"/>
  <ellipse cx="20" cy="22" rx="3" ry="1.6" fill="#c9a96e" transform="rotate(25 20 22)"/>
  <!-- Top seed -->
  <ellipse cx="16" cy="10" rx="2.5" ry="1.4" fill="#e8cc94"/>
</svg>
